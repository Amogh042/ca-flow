name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in tauri.conf.json
        run: |
          python3 -c "
          import json
          data = json.load(open('src-tauri/tauri.conf.json'))
          data['version'] = '${{ steps.version.outputs.VERSION }}'
          json.dump(data, open('src-tauri/tauri.conf.json', 'w'), indent=2)
          "

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx tauri build

      - name: Create latest.json
        run: |
          SIG=$(cat src-tauri/target/release/bundle/macos/CA-flow.app.tar.gz.sig)
          cat > latest.json << JSON
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "See the release notes on GitHub",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/CA-flow.app.tar.gz"
              }
            }
          }
          JSON

      - name: Commit latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          cp latest.json latest.json.new
          mv latest.json.new latest.json
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}" || echo "No changes"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CA-flow ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/CA-flow.app.tar.gz
            src-tauri/target/release/bundle/macos/CA-flow.app.tar.gz.sig
            latest.json
